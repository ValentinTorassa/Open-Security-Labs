name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · check · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier
        run: npx prettier --check .

      - name: Astro check
        run: npx astro check

      - name: Build
        run: npm run build

      # El HTML generado tiene que ser reproducible: dos builds del mismo
      # commit deben ser byte-idénticos (protege contra uids aleatorios y
      # órdenes de colección no determinísticos).
      - name: Determinism check (build twice, diff)
        run: |
          cp -r dist /tmp/dist-first
          npm run build
          diff -r /tmp/dist-first dist

  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
