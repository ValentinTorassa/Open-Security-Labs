name: Weekly health

# Chequeos que no bloquean PRs pero avisan cuando el contenido se pudre:
# links externos muertos (esta revisión encontró 11 de una) y regresiones
# de accesibilidad en el sitio compilado.
on:
  schedule:
    # Lunes 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check links in built site
        uses: lycheeverse/lychee-action@v2
        with:
          # --root-dir resuelve links internos absolutos (/labs/...) contra dist.
          # 403/429: YouTube y CDNs rebotan bots aunque el link viva.
          # 999: LinkedIn responde eso a todo request no-browser.
          args: >-
            --no-progress
            --max-concurrency 4
            --root-dir ${{ github.workspace }}/dist
            --fallback-extensions html
            --accept 200..=299,403,429,999
            'dist/**/*.html'
          fail: true

  a11y:
    name: accessibility smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Serve dist
        run: npx --yes serve dist -l 4999 &

      # Config en .github/pa11yci.json: --no-sandbox para Chrome en runners e
      # ignore del rule de contraste (G18): la paleta apagada del sitio es una
      # decisión de diseño; el job igual detecta regresiones de alt/aria/labels.
      - name: pa11y over representative pages
        run: |
          sleep 3
          npx --yes pa11y-ci --config .github/pa11yci.json \
            http://localhost:4999/ \
            http://localhost:4999/labs/ \
            http://localhost:4999/labs/linux-real/permisos-en-octal/ \
            http://localhost:4999/certificaciones/ \
            http://localhost:4999/certificaciones/comptia-security-plus/ \
            http://localhost:4999/portafolio/ \
            http://localhost:4999/perfil/
